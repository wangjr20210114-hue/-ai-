<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLORIS:一只有温度的大橘</title>
    <script>
      // The dedicated acceptance hostname opens the static test station at its root.
      // The main application hostname keeps its normal chat entry point.
      (function () {
        if (window.location.hostname === 'floris-test.jlutx.com' && window.location.pathname === '/') {
          window.location.replace('/test-cases/');
        }
      })();
      // 首屏即应用已保存的主题，避免闪烁
      (function () {
        try {
          var t = localStorage.getItem('yuanbao-theme');
          document.documentElement.setAttribute('theme-mode', t === 'dark' ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('theme-mode', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
